<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>COPC × CesiumJS</title>
  <style>
    html, body, #cesiumContainer { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; }

    /* ── 상단 툴바 ──────────────────────────────────────────── */
    #toolbar {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px;
      background: rgba(15, 17, 22, 0.88);
      backdrop-filter: blur(6px);
      z-index: 1000;
      flex-wrap: wrap;
    }
    #toolbar label {
      color: #aaa; font-size: 12px; font-family: monospace; white-space: nowrap;
    }
    #urlInput {
      flex: 1; min-width: 260px;
      padding: 5px 10px; border-radius: 4px;
      border: 1px solid #444; background: #1a1d24; color: #eee;
      font-size: 13px; font-family: monospace;
      outline: none;
    }
    #urlInput:focus { border-color: #4a9eff; }
    #loadBtn {
      padding: 5px 14px; border-radius: 4px;
      background: #4a9eff; color: #fff; border: none;
      font-size: 13px; cursor: pointer; white-space: nowrap;
    }
    #loadBtn:hover { background: #3a8eef; }
    #loadBtn:disabled { background: #555; cursor: default; }

    .sep { width: 1px; height: 22px; background: #444; margin: 0 4px; }

    .preset-btn {
      padding: 5px 11px; border-radius: 4px;
      background: #2a2d38; color: #ccc; border: 1px solid #444;
      font-size: 12px; cursor: pointer; white-space: nowrap;
    }
    .preset-btn:hover { background: #3a3e50; color: #fff; }
    .preset-btn.active { background: #2a5099; color: #fff; border-color: #4a9eff; }

    /* ── 좌측 상태 패널 ─────────────────────────────────────── */
    #status {
      position: fixed; top: 54px; left: 10px;
      background: rgba(0,0,0,0.75); color: #fff;
      padding: 10px 14px; border-radius: 6px;
      font-family: monospace; font-size: 13px;
      min-width: 260px; z-index: 999;
      line-height: 1.8;
    }

    #layerSelect {
      padding: 4px 8px; border-radius: 4px;
      background: #1a1d24; color: #eee;
      border: 1px solid #444; font-size: 12px; font-family: monospace;
      cursor: pointer;
    }
    #layerSelect:focus { border-color: #4a9eff; outline: none; }

    #pixelSizeSlider {
      width: 90px; cursor: pointer; vertical-align: middle; accent-color: #4a9eff;
    }
    #pixelSizeVal { color: #4a9eff; }

    /* ── 분류 필터 사이드 패널 ─────────────────────────────── */
    #classSidebar {
      position: fixed; top: 0; left: 0; bottom: 0;
      width: 200px;
      background: rgba(15, 17, 22, 0.92);
      backdrop-filter: blur(6px);
      color: #fff;
      font-family: monospace; font-size: 12px;
      z-index: 1001;
      display: flex; flex-direction: column;
      transform: translateX(-200px);
      transition: transform 0.25s ease;
      padding-top: 54px; /* 툴바 높이만큼 */
    }
    #classSidebar.open { transform: translateX(0); }

    #classSidebarInner {
      padding: 12px 14px;
      overflow-y: auto;
      flex: 1;
      line-height: 1.9;
    }
    #classSidebar b { font-size: 13px; display: block; margin-bottom: 6px; color: #eee; }
    .cls-row { display: flex; align-items: center; gap: 6px; }
    .cls-row input { cursor: pointer; accent-color: #4a9eff; margin: 0; }
    .cls-row label { cursor: pointer; color: #ccc; }

    /* 토글 탭 — 사이드바 오른쪽 끝에 붙어있는 버튼 */
    #classToggleBtn {
      position: fixed; top: 50%; left: 0;
      transform: translateY(-50%);
      width: 22px; height: 60px;
      background: rgba(15, 17, 22, 0.88);
      border: 1px solid #444; border-left: none;
      border-radius: 0 6px 6px 0;
      color: #ccc; font-size: 11px;
      cursor: pointer; z-index: 1002;
      display: flex; align-items: center; justify-content: center;
      writing-mode: vertical-rl;
      transition: left 0.25s ease, background 0.15s;
      user-select: none;
    }
    #classToggleBtn:hover { background: rgba(40, 44, 60, 0.95); color: #fff; }
    #classToggleBtn.open { left: 200px; }

    /* ── 설정 패널 버튼 ─────────────────────────────────────── */
    .setting-btn {
      padding: 5px 10px; border-radius: 4px;
      background: #2a2d38; color: #ccc; border: 1px solid #444;
      font-size: 13px; cursor: pointer; white-space: nowrap;
      user-select: none;
    }
    .setting-btn:hover { background: #3a3e50; color: #fff; }
    .setting-btn.active { background: #2a5099; color: #fff; border-color: #4a9eff; }

    /* ── 설정 플로팅 패널 ─────────────────────────────────── */
    .setting-panel {
      display: none;
      position: fixed; top: 50px; right: 12px;
      background: rgba(15, 17, 22, 0.94);
      backdrop-filter: blur(6px);
      border: 1px solid #444; border-radius: 6px;
      padding: 12px 16px;
      z-index: 1010;
      min-width: 180px;
      color: #ccc; font-family: monospace; font-size: 12px;
      line-height: 2;
    }
    .setting-panel.open { display: block; }
    .setting-panel label { display: block; color: #aaa; margin-bottom: 2px; }
    .setting-panel select,
    .setting-panel input[type="number"] {
      width: 100%;
      padding: 4px 8px; border-radius: 4px;
      background: #1a1d24; color: #eee;
      border: 1px solid #444; font-size: 12px; font-family: monospace;
      box-sizing: border-box;
    }
    .setting-panel select:focus,
    .setting-panel input[type="number"]:focus { border-color: #4a9eff; outline: none; }
    .panel-row { display: flex; align-items: center; gap: 8px; }
    .panel-row input[type="range"] { flex: 1; cursor: pointer; accent-color: #4a9eff; }
    .panel-val { color: #4a9eff; min-width: 28px; text-align: right; }

    /* ── 모바일 반응형 ─────────────────────────────────────── */
    @media (max-width: 600px) {
      #toolbar { gap: 6px; padding: 6px 8px; }
      .sep { display: none; }

      #urlInput { min-width: 0; font-size: 12px; }
      #loadBtn, .preset-btn { padding: 8px 10px; font-size: 12px; min-height: 36px; }
      #pixelSizeSlider { width: 70px; }

      /* 상태 패널: 하단 고정 */
      #status {
        top: auto; bottom: 0;
        left: 0; right: 0;
        border-radius: 0;
        min-width: 0;
        font-size: 11px;
        padding: 6px 10px;
        line-height: 1.6;
      }

      /* 사이드바: 모바일에서는 더 좁게 */
      #classSidebar { width: 170px; transform: translateX(-170px); }
      #classSidebar.open { transform: translateX(0); }
      #classToggleBtn.open { left: 170px; }

      /* 설정 패널: 모바일에서 full-width */
      .setting-panel { left: 8px; right: 8px; min-width: 0; }
    }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>

  <!-- 상단 툴바 -->
  <div id="toolbar">
    <label>URL</label>
    <input id="urlInput" type="text" placeholder="https://example.com/data.copc.laz" spellcheck="false" />
    <button id="loadBtn">불러오기</button>
    <div class="sep"></div>
    <label>프리셋</label>
    <button class="preset-btn" data-preset="autzen">Autzen Stadium</button>
    <button class="preset-btn" data-preset="sofi">SoFi Stadium</button>
    <button class="preset-btn" data-preset="trestle">Trestle Bridge</button>
    <button class="preset-btn" data-preset="sandiego">San Diego 2005</button>
    <div class="sep"></div>
    <button class="setting-btn" data-panel="panelMap">🗺 지도</button>
    <button class="setting-btn" data-panel="panelRender">⚙ 렌더링</button>
    <button class="setting-btn" data-panel="panelHeight">↕ 고도</button>
  </div>

  <!-- 지도 설정 패널 -->
  <div id="panelMap" class="setting-panel">
    <label>지도 레이어</label>
    <select id="layerSelect">
      <option value="satellite">위성</option>
      <option value="osm">도로(OSM)</option>
      <option value="none">없음</option>
    </select>
  </div>

  <!-- 렌더링 설정 패널 -->
  <div id="panelRender" class="setting-panel">
    <label>점 크기 <span id="pixelSizeVal">2</span>px</label>
    <div class="panel-row">
      <input id="pixelSizeSlider" type="range" min="1" max="8" step="0.5" value="2">
    </div>
    <label style="margin-top:8px">세밀도 <span id="sseVal">250</span>px</label>
    <div class="panel-row">
      <input id="sseSlider" type="range" min="50" max="3000" step="50" value="250">
    </div>
  </div>

  <!-- 고도 설정 패널 -->
  <div id="panelHeight" class="setting-panel">
    <label>고도 보정 (m)</label>
    <input id="heightOffsetInput" type="number" value="0" step="1"
           style="text-align:right;">
  </div>

  <!-- 상태 패널 -->
  <div id="status">초기화 중...</div>

  <!-- 분류 필터 사이드바 -->
  <div id="classSidebar">
    <div id="classSidebarInner">
      <b>분류 필터</b>
      <div class="cls-row">
        <input type="checkbox" id="allClassCheck" checked>
        <label for="allClassCheck">전체 선택/해제</label>
      </div>
      <hr style="border-color:#444; margin:6px 0">
      <div id="classCheckboxes"></div>
    </div>
  </div>

  <!-- 분류 필터 토글 탭 -->
  <button id="classToggleBtn" title="분류 필터">필터</button>

  <!-- fetch 패치: Range 요청에만 cache:'no-store' 적용 (ERR_CACHE_OPERATION_NOT_SUPPORTED 우회).
       일반 fetch(지형, 이미지 등)는 그대로 두어 불필요한 캐시 우회를 최소화한다. -->
  <script>
    (function () {
      var _fetch = window.fetch.bind(window);
      window.fetch = function (input, init) {
        var h = init && init.headers;
        var isRange = h && (
          (typeof Headers !== 'undefined' && h instanceof Headers && h.has('Range')) ||
          (h !== null && typeof h === 'object' && !Array.isArray(h) && ('Range' in h || 'range' in h)) ||
          (Array.isArray(h) && h.some(function (p) { return p[0] && p[0].toLowerCase() === 'range'; }))
        );
        if (!isRange) return _fetch(input, init);
        return _fetch(input, Object.assign({}, init, { cache: 'no-store' }));
      };
    })();
  </script>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
