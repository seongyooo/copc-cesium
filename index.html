<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>COPC × CesiumJS</title>
  <style>
    html, body, #cesiumContainer { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; }

    /* ── 상단 툴바 ──────────────────────────────────────────── */
    #toolbar {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px;
      background: rgba(15, 17, 22, 0.88);
      backdrop-filter: blur(6px);
      z-index: 1000;
      flex-wrap: wrap;
    }
    #toolbar label {
      color: #aaa; font-size: 12px; font-family: monospace; white-space: nowrap;
    }
    #urlInput {
      flex: 1; min-width: 260px;
      padding: 5px 10px; border-radius: 4px;
      border: 1px solid #444; background: #1a1d24; color: #eee;
      font-size: 13px; font-family: monospace;
      outline: none;
    }
    #urlInput:focus { border-color: #4a9eff; }
    #loadBtn {
      padding: 5px 14px; border-radius: 4px;
      background: #4a9eff; color: #fff; border: none;
      font-size: 13px; cursor: pointer; white-space: nowrap;
    }
    #loadBtn:hover { background: #3a8eef; }
    #loadBtn:disabled { background: #555; cursor: default; }

    .sep { width: 1px; height: 22px; background: #444; margin: 0 4px; }

    .preset-btn {
      padding: 5px 11px; border-radius: 4px;
      background: #2a2d38; color: #ccc; border: 1px solid #444;
      font-size: 12px; cursor: pointer; white-space: nowrap;
    }
    .preset-btn:hover { background: #3a3e50; color: #fff; }
    .preset-btn.active { background: #2a5099; color: #fff; border-color: #4a9eff; }

    /* ── 좌측 상태 패널 ─────────────────────────────────────── */
    #status {
      position: fixed; top: 54px; left: 10px;
      background: rgba(0,0,0,0.75); color: #fff;
      padding: 10px 14px; border-radius: 6px;
      font-family: monospace; font-size: 13px;
      min-width: 260px; z-index: 999;
      line-height: 1.8;
    }

    /* ── 우측 하단 컨트롤 ───────────────────────────────────── */
    #controls {
      position: fixed; bottom: 20px; right: 14px;
      display: flex; flex-direction: column; gap: 8px;
      z-index: 999;
    }
    .ctrl-btn {
      padding: 7px 14px; border-radius: 5px;
      background: rgba(15, 17, 22, 0.85); color: #ccc;
      border: 1px solid #444; font-size: 13px;
      cursor: pointer; text-align: center;
      backdrop-filter: blur(4px);
    }
    .ctrl-btn:hover { background: rgba(40, 44, 60, 0.95); color: #fff; }
    .ctrl-btn.on  { color: #4a9eff; border-color: #4a9eff; }
    .ctrl-btn.off { color: #ff6b6b; border-color: #ff6b6b; }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>

  <!-- 상단 툴바 -->
  <div id="toolbar">
    <label>URL</label>
    <input id="urlInput" type="text" placeholder="https://example.com/data.copc.laz" spellcheck="false" />
    <button id="loadBtn">불러오기</button>
    <div class="sep"></div>
    <label>프리셋</label>
    <button class="preset-btn" data-preset="autzen">Autzen Stadium</button>
    <button class="preset-btn" data-preset="sofi">SoFi Stadium</button>
    <button class="preset-btn" data-preset="millsite">Millsite</button>
  </div>

  <!-- 상태 패널 -->
  <div id="status">초기화 중...</div>

  <!-- 우측 하단 컨트롤 -->
  <div id="controls">
    <button id="satelliteBtn" class="ctrl-btn on">🛰 위성지도 ON</button>
  </div>

  <!-- fetch 패치: Range 요청에만 cache:'no-store' 적용 (ERR_CACHE_OPERATION_NOT_SUPPORTED 우회).
       일반 fetch(지형, 이미지 등)는 그대로 두어 불필요한 캐시 우회를 최소화한다. -->
  <script>
    (function () {
      var _fetch = window.fetch.bind(window);
      window.fetch = function (input, init) {
        var h = init && init.headers;
        var isRange = h && (
          (typeof Headers !== 'undefined' && h instanceof Headers && h.has('Range')) ||
          (h !== null && typeof h === 'object' && !Array.isArray(h) && ('Range' in h || 'range' in h)) ||
          (Array.isArray(h) && h.some(function (p) { return p[0] && p[0].toLowerCase() === 'range'; }))
        );
        if (!isRange) return _fetch(input, init);
        return _fetch(input, Object.assign({}, init, { cache: 'no-store' }));
      };
    })();
  </script>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
