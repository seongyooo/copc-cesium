<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>COPC × CesiumJS PoC</title>
  <style>
    html, body, #cesiumContainer { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; }
    #status {
      position: fixed; top: 10px; left: 10px;
      background: rgba(0,0,0,0.75); color: #fff;
      padding: 12px 16px; border-radius: 6px;
      font-family: monospace; font-size: 13px;
      min-width: 280px; z-index: 999;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>
  <div id="status">초기화 중...</div>
  <!-- fetch 패치: cache: 'no-store' 강제 (ERR_CACHE_OPERATION_NOT_SUPPORTED 우회)
       클래식 스크립트는 모듈보다 먼저 실행되므로 copc.js가 import되기 전에 적용됨 -->
  <script>
    (function () {
      var _fetch = window.fetch.bind(window);
      window.fetch = function (input, init) {
        return _fetch(input, Object.assign({}, init, { cache: 'no-store' }));
      };
    })();
  </script>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
